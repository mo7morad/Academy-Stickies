<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- No maximum-scale: pinch-zoom must stay available. Fields are 18px, so
         iOS has no reason to zoom on focus anyway. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#fdfbf7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1e1e1e" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="description" content="A private board of sticky notes between academy members." />
    <!-- Fonts are self-hosted (see src/styles/fonts.css); preload just the two
         latin subsets that every first paint needs. -->
    <link
      rel="preload"
      href="/fonts/PatrickHand-400-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/Kalam-700-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <title>Academy Stickies</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
