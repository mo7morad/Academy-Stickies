<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- No maximum-scale: pinch-zoom must stay available. Fields are 18px, so
         iOS has no reason to zoom on focus anyway. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#fdfbf7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1e1e1e" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- The home-screen label. Without it iOS uses <title>, which wraps. -->
    <meta name="apple-mobile-web-app-title" content="Stickies" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="description" content="A private board of sticky notes between academy members." />
    <!-- Safari requests /favicon.ico whether or not it is declared. This is a
         single-page app, so that request used to fall through to index.html,
         served 200 as text/html — Safari drew a letter tile instead. A real
         icon has to exist at that path. -->
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <!-- SVG for tabs that take it; iOS only ever reads the PNG. Both are the
         small-size mark — icon.svg keeps the full art for the home screen. -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- Fonts are self-hosted (see src/styles/fonts.css); preload just the two
         latin subsets that every first paint needs. -->
    <link
      rel="preload"
      href="/fonts/PatrickHand-400-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/Kalam-700-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <title>Academy Stickies</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
