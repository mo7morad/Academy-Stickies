<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Academy Stickies">
  <title>Academy Stickies</title>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff4ad"/>
      <stop offset="1" stop-color="#ffd83f"/>
    </linearGradient>
  </defs>

  <!-- The tab mark. icon.svg is the same note with its tape and ruled lines
       intact, which is right at 192px and grey mush at 16 — this one keeps the
       two shapes that still read at tab size: the tilted paper and the heart.
       Kept in sync with the favicon.ico bitmaps. -->
  <g transform="rotate(-6 256 256)">
    <rect x="34" y="34" width="444" height="444" rx="44"
          fill="url(#paper)" stroke="#2d2d2d" stroke-width="22"/>
    <path d="M256 322C198 277 168 246 168 215C168 190 188 171 213 171C232 171 248 182 256 197C264 182 280 171 299 171C324 171 344 190 344 215C344 246 314 277 256 322Z"
          transform="translate(256 252) scale(1.4205) translate(-256 -246.5)"
          fill="#d32f2f" stroke="#2d2d2d" stroke-width="9.2" stroke-linejoin="round"/>
  </g>
</svg>
